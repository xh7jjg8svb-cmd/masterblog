<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Blogbeitrag bearbeiten</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Blogbeitrag bearbeiten</h1>

    <form method="POST" action="{{ url_for('update', post_id=post.id) }}" class="add-form">
        <label for="author">Autor:</label><br>
        <input type="text" id="author" name="author" value="{{ post.author }}" required><br><br>

        <label for="title">Titel:</label><br>
        <input type="text" id="title" name="title" value="{{ post.title }}" required><br><br>

        <label for="content">Inhalt:</label><br>
        <textarea id="content" name="content" rows="6" cols="50" required>{{ post.content }}</textarea><br><br>

        <button type="submit">Beitrag aktualisieren</button>
    </form>

    <p><a href="{{ url_for('index') }}">← Zurück zur Startseite</a></p>
</body>
</html>

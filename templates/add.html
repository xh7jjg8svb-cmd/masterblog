<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Neuen Beitrag hinzufügen</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Neuen Blogbeitrag hinzufügen</h1>

    <form method="POST" action="{{ url_for('add') }}" class="add-form">
        <label for="author">Autor:</label><br>
        <input type="text" id="author" name="author" required><br><br>

        <label for="title">Titel:</label><br>
        <input type="text" id="title" name="title" required><br><br>

        <label for="content">Inhalt:</label><br>
        <textarea id="content" name="content" rows="6" cols="50" required></textarea><br><br>

        <button type="submit">Beitrag speichern</button>
    </form>

    <p><a href="{{ url_for('index') }}">← Zurück zur Startseite</a></p>
</body>
</html>

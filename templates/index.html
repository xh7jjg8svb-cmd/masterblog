<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Mein Blog</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Mein Blog</h1>

    <!-- Link zur Add-Seite -->
    <p><a href="{{ url_for('add') }}">➕ Neuen Beitrag hinzufügen</a></p>

    {% for post in posts %}
        <div class="post">
            <h2>{{ post.title }}</h2>
            <p><strong>Autor:</strong> {{ post.author }}</p>
            <p>{{ post.content }}</p>
            <p>Likes: {{ post.likes or 0 }}</p>

            <!-- Like-Button -->
            <form action="{{ url_for('like', post_id=post.id) }}" method="GET" style="display:inline;">
                <button type="submit" class="like-button">❤️ Like</button>
            </form>

            <!-- Bearbeiten-Button -->
            <form action="{{ url_for('update', post_id=post.id) }}" method="GET" style="display:inline;">
                <button type="submit" class="edit-button">✏️ Bearbeiten</button>
            </form>

            <!-- Löschen-Button -->
            <form action="{{ url_for('delete', post_id=post.id) }}" method="GET" style="display:inline;">
                <button type="submit" class="delete-button">🗑️ Löschen</button>
            </form>
        </div>
        <hr>
    {% else %}
        <p>Keine Blogposts gefunden.</p>
    {% endfor %}
</body>
</html>
